# ------------------------------------------------------------
# adm.dev.jedieduca.com.br
# ------------------------------------------------------------



map $scheme $hsts_header {
    https   "max-age=63072000; preload";
}

server {
  set $forward_scheme http;
  set $server         "php_cadjedi";
  set $port           9000;

  listen 80;
listen [::]:80;


  server_name adm.dev.jedieduca.com.br;
http2 off;












  access_log /data/logs/proxy-host-6_access.log proxy;
  error_log /data/logs/proxy-host-6_error.log warn;

root /var/www/html;
index index.php index.html;

location / {
    # Redireciona a raiz do subdomínio direto para a pasta adm
    rewrite ^/$ /adm/ permanent;
    try_files $uri $uri/ /adm/index.php?$query_string;
}

location ~ \.php$ {
    fastcgi_pass php_cadjedi:9000;
    fastcgi_index index.php;
    include fastcgi_params;
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    
    # Parâmetros de ambiente que o Adianti precisa
    fastcgi_param HTTP_HOST adm.dev.jedieduca.com.br;
    fastcgi_param SERVER_NAME adm.dev.jedieduca.com.br;
    fastcgi_param HTTPS off;
}





  # Custom
  include /data/nginx/custom/server_proxy[.]conf;
}

