# ------------------------------------------------------------
# api.dev.jedieduca.com.br
# ------------------------------------------------------------



map $scheme $hsts_header {
    https   "max-age=63072000; preload";
}

server {
  set $forward_scheme http;
  set $server         "python_service";
  set $port           8001;

  listen 80;
listen [::]:80;


  server_name api.dev.jedieduca.com.br;
http2 off;






  # Block Exploits
  include conf.d/include/block-exploits.conf;







  access_log /data/logs/proxy-host-8_access.log proxy;
  error_log /data/logs/proxy-host-8_error.log warn;



  location /static {
    

    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Scheme $scheme;
    proxy_set_header X-Forwarded-Proto  $scheme;
    proxy_set_header X-Forwarded-For    $remote_addr;
    proxy_set_header X-Real-IP		$remote_addr;

    proxy_pass       http://python_service:8001;

    

    
    
  # Block Exploits
  include conf.d/include/block-exploits.conf;

    
    


    
  }





  location / {






    

    # Proxy!
    include conf.d/include/proxy.conf;
  }


  # Custom
  include /data/nginx/custom/server_proxy[.]conf;
}

