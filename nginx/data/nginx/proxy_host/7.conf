# ------------------------------------------------------------
# mad.dev.jedieduca.com.br
# ------------------------------------------------------------



map $scheme $hsts_header {
    https   "max-age=63072000; preload";
}

server {
  set $forward_scheme http;
  set $server         "php_cadjedi";
  set $port           9000;

  listen 80;
listen [::]:80;

listen 443 ssl;
listen [::]:443 ssl;


  server_name mad.dev.jedieduca.com.br;

  http2 on;


  # Custom SSL
  ssl_certificate /data/custom_ssl/npm-3/fullchain.pem;
  ssl_certificate_key /data/custom_ssl/npm-3/privkey.pem;












    # Force SSL
    
    set $trust_forwarded_proto "F";
    
    include conf.d/include/force-ssl.conf;





  access_log /data/logs/proxy-host-7_access.log proxy;
  error_log /data/logs/proxy-host-7_error.log warn;

root /var/www/html;
index index.php index.html;

location / {
    # Redireciona a raiz do subdomínio direto para a pasta adm
    rewrite ^/$ /mad/ permanent;
    try_files $uri $uri/ /mad/index.php?$query_string;
}

location ~ \.php$ {
    fastcgi_pass php_cadjedi:9000;
    fastcgi_index index.php;
    include fastcgi_params;
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    
    # Parâmetros de ambiente que o Adianti precisa
    fastcgi_param HTTP_HOST mad.dev.jedieduca.com.br;
    fastcgi_param SERVER_NAME mad.dev.jedieduca.com.br;
    fastcgi_param HTTPS off;
}





  # Custom
  include /data/nginx/custom/server_proxy[.]conf;
}

