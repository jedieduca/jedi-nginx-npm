# ------------------------------------------------------------
# phpmyadmin.dev.jedieduca.com.br
# ------------------------------------------------------------



map $scheme $hsts_header {
    https   "max-age=63072000; preload";
}

server {
  set $forward_scheme http;
  set $server         "phpmyadmin_container";
  set $port           80;

  listen 80;
listen [::]:80;


  server_name phpmyadmin.dev.jedieduca.com.br;
http2 off;






  # Block Exploits
  include conf.d/include/block-exploits.conf;







  access_log /data/logs/proxy-host-9_access.log proxy;
  error_log /data/logs/proxy-host-9_error.log warn;

location / {
    proxy_pass http://phpmyadmin_container:80; # 🔹 Substitua pelo nome real do container se for diferente
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    
    proxy_read_timeout 600s;
    proxy_connect_timeout 600s;
}





  # Custom
  include /data/nginx/custom/server_proxy[.]conf;
}

